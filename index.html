.tt-n{font-family:'Cinzel',serif;font-size:.6rem;color:rgba(201,170,90,.5);letter-spacing:.15em;}

.tt-aro span{color:rgba(201,170,90,.5);font-family:'Cinzel',serif;font-size:.56rem;

.tt-ck{display:inline-block;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;

footer{display:flex;flex-wrap:wrap;justify-content:center;

.leg{display:flex;align-items:center;gap:5px;font-family:'Cinzel',serif;

.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.attribution{width:100%;text-align:center;padding:12px 0 28px;

  {n:64, name:"Vācaspati",            skt:"वाचस्पति",              ck:11, cn:"RUDRA",  R:"R2",G:"G3",M:"M2",D:"D2",N:"N2", aro:"S R2 G3 M2 P D2 N2 S", ava:"S N2 D2 P M2 G3 R2 S"},
  {n:65, name:"Mēcakalyāṇi",          skt:"मेचकळ्याणि",           ck:11, cn:"RUDRA",  R:"R2",G:"G3",M:"M2",D:"D2",N:"N3", aro:"S R2 G3 M2 P D2 N3 S", ava:"S N3 D2 P M2 G3 R2 S"},
  {n:66, name:"Citrāmbari",           skt:"चित्राम्बरि",           ck:11, cn:"RUDRA",  R:"R2",G:"G3",M:"M2",D:"D3",N:"N3", aro:"S R2 G3 M2 P D3 N3 S", ava:"S N3 D3 P M2 G3 R2 S"},
  {n:67, name:"Sucaritra",            skt:"सुचरित्र",              ck:12, cn:"ADITYA", R:"R3",G:"G3",M:"M2",D:"D1",N:"N1", aro:"S R3 G3 M2 P D1 N1 S", ava:"S N1 D1 P M2 G3 R3 S"},
  {n:68, name:"Jyōtisvarūpiṇi",       skt:"ज्योतिस्वरूपिणि",      ck:12, cn:"ADITYA", R:"R3",G:"G3",M:"M2",D:"D1",N:"N2", aro:"S R3 G3 M2 P D1 N2 S", ava:"S N2 D1 P M2 G3 R3 S"},
  {n:69, name:"Dhātuvardhini",        skt:"धातुवर्धिनि",           ck:12, cn:"ADITYA", R:"R3",G:"G3",M:"M2",D:"D1",N:"N3", aro:"S R3 G3 M2 P D1 N3 S", ava:"S N3 D1 P M2 G3 R3 S"},
  {n:70, name:"Nāsikābhūṣaṇi",        skt:"नासिकाभूषणि",          ck:12, cn:"ADITYA", R:"R3",G:"G3",M:"M2",D:"D2",N:"N2", aro:"S R3 G3 M2 P D2 N2 S", ava:"S N2 D2 P M2 G3 R3 S"},
  {n:71, name:"Kōsalā",               skt:"कोसला",                 ck:12, cn:"ADITYA", R:"R3",G:"G3",M:"M2",D:"D2",N:"N3", aro:"S R3 G3 M2 P D2 N3 S", ava:"S N3 D2 P M2 G3 R3 S"},
  {n:72, name:"Rāsikapriya",          skt:"रसिकप्रिय",             ck:12, cn:"ADITYA", R:"R3",G:"G3",M:"M2",D:"D3",N:"N3", aro:"S R3 G3 M2 P D3 N3 S", ava:"S N3 D3 P M2 G3 R3 S"},
];

const CKC={1:'#d4595a',2:'#b068cc',3:'#52c490',4:'#5580d4',5:'#d4a83a',6:'#d45aad',
           7:'#52c4bc',8:'#d47840',9:'#52a8d4',10:'#9cd452',11:'#d45272',12:'#7852d4'};
const CKN={1:'INDU',2:'NETRA',3:'AGNI',4:'VEDA',5:'BANA',6:'RUTU',
           7:'RISHI',8:'VASU',9:'BRAHMA',10:'DISHI',11:'RUDRA',12:'ADITYA'};
const VO={'1':0.20,'2':0.50,'3':0.88};

const K={ctrR:44,mI:52,mO:96,rI:100,rO:140,gI:144,gO:184,dI:188,dO:228,nI:232,nO:274,nmI:278,nmO:378,ckLbl:390,rim:396};
const SEG=360/72, GAP=0.35;

const SV=document.getElementById('svg'), NS='http://www.w3.org/2000/svg';
const mk=(t,a={})=>{const e=document.createElementNS(NS,t);for(const[k,v] of Object.entries(a))e.setAttribute(k,v);return e;};
function AP(r1,r2,aS,aE){
  const s=(aS-90)*Math.PI/180,e2=(aE-90)*Math.PI/180,lg=(aE-aS)>180?1:0;
  const P=(r,a)=>`${+(r*Math.cos(a)).toFixed(3)},${+(r*Math.sin(a)).toFixed(3)}`;
  return `M${P(r1,s)}L${P(r2,s)}A${r2},${r2},0,${lg},1,${P(r2,e2)}L${P(r1,e2)}A${r1},${r1},0,${lg},0,${P(r1,s)}Z`;
}
function circ(r,stroke,sw){SV.appendChild(mk('circle',{cx:0,cy:0,r,fill:'none',stroke,'stroke-width':sw}));}

// Background
const defs=mk('defs');
const rg=mk('radialGradient',{id:'bg',cx:'50%',cy:'50%',r:'50%'});
[[0,'rgba(201,170,90,0.08)'],[.55,'rgba(201,170,90,0.02)'],[1,'rgba(0,0,0,0)']].forEach(([o,c])=>{
  const s=mk('stop',{offset:o});s.setAttribute('stop-color',c);rg.appendChild(s);});
defs.appendChild(rg);SV.appendChild(defs);
SV.appendChild(mk('circle',{cx:0,cy:0,r:K.rim+14,fill:'url(#bg)'}));

// Ring borders
const G='rgba(201,170,90,0.2)',GB='rgba(201,170,90,0.45)';
[K.mI,K.mO,K.rI,K.rO,K.gI,K.gO,K.dI,K.dO,K.nI,K.nO,K.nmI,K.nmO].forEach(r=>{
  const b=(r===K.mI||r===K.nmO);circ(r,b?GB:G,b?1.3:0.55);});
circ(K.rim,'rgba(201,170,90,0.18)',2.5);

// Tick marks
for(let i=0;i<72;i++){
  const a=(i*SEG-90)*Math.PI/180;
  SV.appendChild(mk('line',{x1:+(Math.cos(a)*(K.rim+1)).toFixed(2),y1:+(Math.sin(a)*(K.rim+1)).toFixed(2),
    x2:+(Math.cos(a)*(K.rim+6)).toFixed(2),y2:+(Math.sin(a)*(K.rim+6)).toFixed(2),
    stroke:'rgba(201,170,90,0.22)','stroke-width':0.7}));
}

const gM=mk('g'),gR=mk('g'),gG=mk('g'),gD=mk('g'),gN=mk('g'),gNm=mk('g'),gLbl=mk('g'),gHit=mk('g');
[gM,gR,gG,gD,gN,gNm,gLbl,gHit].forEach(g=>SV.appendChild(g));

DATA.forEach((r,i)=>{
  const col=CKC[r.ck];
  const aS=i*SEG+GAP/2, aE=(i+1)*SEG-GAP/2, midA=(i+0.5)*SEG;
  const flip=midA>180, rot=flip?midA-90+180:midA-90;
  const mRad=(midA-90)*Math.PI/180;
  const seg=(r1,r2,fill,op)=>mk('path',{d:AP(r1,r2,aS,aE),fill,'fill-opacity':op,stroke:fill,'stroke-width':0.35,'stroke-opacity':0.35});

  const mFill=r.M==='M1'?'#d4913a':'#3a8ed4';
  gM.appendChild(seg(K.mI,K.mO,mFill,r.M==='M1'?0.58:0.62));
  gR.appendChild(seg(K.rI,K.rO,col,VO[r.R.slice(1)]));
  gG.appendChild(seg(K.gI,K.gO,col,VO[r.G.slice(1)]));
  gD.appendChild(seg(K.dI,K.dO,col,VO[r.D.slice(1)]));
  gN.appendChild(seg(K.nI,K.nO,col,VO[r.N.slice(1)]));
  gNm.appendChild(seg(K.nmI,K.nmO,col,0.10));

  const nR=K.nmI+12,[nx,ny]=[nR*Math.cos(mRad),nR*Math.sin(mRad)];
  const nt=mk('text',{x:nx,y:ny,fill:col,'font-family':'Cinzel,serif','font-size':'6.5','font-weight':'700',
    'text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${rot},${nx},${ny})`});
  nt.textContent=r.n; gLbl.appendChild(nt);

  const nmR=K.nmI+38,[tx,ty]=[nmR*Math.cos(mRad),nmR*Math.sin(mRad)];
  let dn=r.name; if(dn.length>15)dn=dn.slice(0,14)+'…';
  const nmt=mk('text',{x:tx,y:ty,fill:'rgba(240,232,208,0.84)','font-family':'EB Garamond,serif','font-size':'7.2',
    'text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${rot},${tx},${ty})`});
  nmt.textContent=dn; gLbl.appendChild(nmt);

  // Sanskrit name (innermost, very small)
  const sktR=K.nmI+62,[sx,sy]=[sktR*Math.cos(mRad),sktR*Math.sin(mRad)];
  const snmt=mk('text',{x:sx,y:sy,fill:`${col}88`,'font-family':'Noto Serif Devanagari,serif','font-size':'6',
    'text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${rot},${sx},${sy})`});
  snmt.textContent=r.skt; gLbl.appendChild(snmt);

  const hit=mk('path',{d:AP(K.mI,K.nmO,aS,aE),fill:'transparent',stroke:'none',cursor:'pointer'});
  hit.addEventListener('mouseenter',e=>{showTT(e,r);hit.setAttribute('fill','rgba(255,255,255,0.045)');});
  hit.addEventListener('mousemove',moveTT);
  hit.addEventListener('mouseleave',()=>{hideTT();hit.setAttribute('fill','transparent');});
  gHit.appendChild(hit);
});

// Chakra dividers + labels
for(let c=0;c<12;c++){
  const a=(c*30-90)*Math.PI/180;
  SV.appendChild(mk('line',{x1:+(K.mI*Math.cos(a)).toFixed(2),y1:+(K.mI*Math.sin(a)).toFixed(2),
    x2:+(K.nmO*Math.cos(a)).toFixed(2),y2:+(K.nmO*Math.sin(a)).toFixed(2),
    stroke:'rgba(201,170,90,0.52)','stroke-width':1.1}));
  const midA=(c+0.5)*30, ar=(midA-90)*Math.PI/180;
  const flip=midA>180,rot=flip?midA-90+180:midA-90;
  const[cx,cy]=[K.ckLbl*Math.cos(ar),K.ckLbl*Math.sin(ar)];
  const ct=mk('text',{x:cx,y:cy,fill:CKC[c+1],'font-family':'Cinzel,serif','font-size':'7.8','font-weight':'600',
    'letter-spacing':'1.2','text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${rot},${cx},${cy})`});
  ct.textContent=CKN[c+1]; SV.appendChild(ct);
}

// M1/M2 split line at 180°
const mDA=(180-90)*Math.PI/180;
SV.appendChild(mk('line',{x1:+(K.mI*Math.cos(mDA)).toFixed(2),y1:+(K.mI*Math.sin(mDA)).toFixed(2),
  x2:+(K.nmO*Math.cos(mDA)).toFixed(2),y2:+(K.nmO*Math.sin(mDA)).toFixed(2),
  stroke:'rgba(201,170,90,0.9)','stroke-width':2.5}));
const zDA=(0-90)*Math.PI/180;
SV.appendChild(mk('line',{x1:+(K.mI*Math.cos(zDA)).toFixed(2),y1:+(K.mI*Math.sin(zDA)).toFixed(2),
  x2:+(K.nmO*Math.cos(zDA)).toFixed(2),y2:+(K.nmO*Math.sin(zDA)).toFixed(2),
  stroke:'rgba(201,170,90,0.5)','stroke-width':1.5}));

[{y:-68,txt:'M1',col:'#d4913a'},{y:68,txt:'M2',col:'#3a8ed4'}].forEach(({y,txt,col})=>{
  const t=mk('text',{x:0,y,fill:col,'font-family':'Cinzel,serif','font-size':'9.5','font-weight':'700',
    'text-anchor':'middle','dominant-baseline':'middle','letter-spacing':'1'});
  t.textContent=txt; SV.appendChild(t);
});

// Swara ring labels at ~359°
[{r:(K.mI+K.mO)/2,lbl:'M'},{r:(K.rI+K.rO)/2,lbl:'R'},{r:(K.gI+K.gO)/2,lbl:'G'},
 {r:(K.dI+K.dO)/2,lbl:'D'},{r:(K.nI+K.nO)/2,lbl:'N'}].forEach(({r,lbl})=>{
  const ang=359.4,a=(ang-90)*Math.PI/180,[x,y]=[r*Math.cos(a),r*Math.sin(a)];
  const t=mk('text',{x,y,fill:'rgba(201,170,90,0.65)','font-family':'Cinzel,serif','font-size':'7.5','font-weight':'600',
    'text-anchor':'middle','dominant-baseline':'middle',transform:`rotate(${ang-90},${x},${y})`});
  t.textContent=lbl; SV.appendChild(t);
});

// Centre
SV.appendChild(mk('circle',{cx:0,cy:0,r:K.ctrR,fill:'#0b0910',stroke:'rgba(201,170,90,0.42)','stroke-width':1.4}));
SV.appendChild(mk('circle',{cx:0,cy:0,r:K.ctrR-8,fill:'none',stroke:'rgba(201,170,90,0.10)','stroke-width':0.8}));
const ctL=mk('text',{x:0,y:-7,fill:'rgba(201,170,90,0.82)','font-family':'Cinzel,serif','font-size':'12','font-weight':'700',
  'text-anchor':'middle','dominant-baseline':'middle','letter-spacing':'3'});
ctL.textContent='S · P'; SV.appendChild(ctL);
const ctS=mk('text',{x:0,y:10,fill:'rgba(201,170,90,0.32)','font-family':'EB Garamond,serif','font-size':'7','font-style':'italic',
  'text-anchor':'middle','dominant-baseline':'middle'});
ctS.textContent='Shadja · Panchama'; SV.appendChild(ctS);
const ctF=mk('text',{x:0,y:21,fill:'rgba(201,170,90,0.2)','font-family':'Cinzel,serif','font-size':'5.5','letter-spacing':'1',
  'text-anchor':'middle','dominant-baseline':'middle'});
ctF.textContent='FIXED'; SV.appendChild(ctF);

// Tooltip
const ttEl=document.getElementById('tt');
function showTT(e,r){
  const col=CKC[r.ck];
  ttEl.innerHTML=`<div class="tt-n">MELA № ${r.n}</div>
    <div class="tt-name">${r.name}</div>
    <div class="tt-skt">${r.skt}</div>
    <div class="tt-sw">S · ${r.R} · ${r.G} · ${r.M} · P · ${r.D} · ${r.N} · S</div>
    <div class="tt-aro"><span>ĀRO</span>${r.aro}</div>
    <div class="tt-aro"><span>AVA</span>${r.ava}</div>
    <span class="tt-ck" style="border-color:${col}44;color:${col}">Chakra ${r.ck} · ${r.cn}</span>`;
  ttEl.classList.add('on');moveTT(e);
}
function moveTT(e){
  let x=e.clientX+14,y=e.clientY+14;
  if(x+270>window.innerWidth)x=e.clientX-280;
  if(y+190>window.innerHeight)y=e.clientY-200;
  ttEl.style.left=x+'px';ttEl.style.top=y+'px';
}
function hideTT(){ttEl.classList.remove('on');}

// Legend
const footer=document.getElementById('footer');
for(let c=1;c<=12;c++){
  const d=document.createElement('div');d.className='leg';
  d.innerHTML=`<div class="leg-dot" style="background:${CKC[c]}"></div>${c}. ${CKN[c]}`;
  footer.appendChild(d);
}
</script>
</body>
</html>
